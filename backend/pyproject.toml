[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["migrations/", ".venv/", ".venv314/"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["S101", "COM812", "ISC001"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
no_implicit_optional = true

[tool.pytest.ini_options]
pythonpath = ["."]
markers = [
    "integration: tests requiring a running backend, seeded users, or external services",
]
