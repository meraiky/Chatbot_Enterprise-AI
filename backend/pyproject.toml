[tool.ruff]
line-length = 150
target-version = "py312"
exclude = ["migrations/", ".venv/", ".venv314/"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
# S101: assert in tests, COM812/ISC001: formatter conflicts
# B008: FastAPI Depends/Cookie/Query in default args (idiomatic, can't avoid)
# E402: intentional deferred imports (e.g. conditional FastAPI imports after logic blocks)
ignore = ["S101", "COM812", "ISC001", "B008", "E402"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
no_implicit_optional = true

[tool.pytest.ini_options]
pythonpath = ["."]
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    "ignore::FutureWarning:langchain_google_genai\\.chat_models",
    "ignore:builtin type SwigPy.* has no __module__ attribute:DeprecationWarning",
    "ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning",
]
markers = [
    "integration: tests requiring a running backend, seeded users, or external services",
]
