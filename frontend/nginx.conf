server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Limit upload size to 50MB (for PDF documents)
    client_max_body_size 50M;

    # SPA routing — redirect all 404s to index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Security headers for SPA — scoped here so they don't duplicate
        # the backend's own headers on proxied /api/ responses.
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # 'unsafe-inline' required for Tailwind CSS injected styles
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;
        # HSTS must only be sent over HTTPS — browsers ignore it over HTTP anyway,
        # but sending it over HTTP is technically incorrect per RFC 6797.
        if ($scheme = "https") {
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        }
    }

    # Proxy API calls to the backend service
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming support — disable all buffering for server-sent events
        proxy_buffering off;
        proxy_cache off;
        # 300s covers slow hybrid RAG + web search + LLM generation chains
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        keepalive_timeout 300s;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
